<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS 사물함 예약 시스템</title>
    <!-- React & Tailwind CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @keyframes pulse-border {
            0% { border-color: rgba(37, 99, 235, 0.5); }
            50% { border-color: rgba(37, 99, 235, 1); }
            100% { border-color: rgba(37, 99, 235, 0.5); }
        }
        .mine-highlight {
            animation: pulse-border 2s infinite;
        }
        /* 그리드 크기 고정을 위한 스타일 */
        .locker-cell {
            width: 90px; /* 고정 너비 */
            height: 90px; /* 고정 높이 */
            flex-shrink: 0;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useCallback, useMemo } = React;

        // Firebase Modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCANVK_865365opkg7r-rWHEZsFLQ93zJ0",
            authDomain: "book-your-locker.firebaseapp.com",
            projectId: "book-your-locker",
            storageBucket: "book-your-locker.firebasestorage.app",
            messagingSenderId: "859305778315",
            appId: "1:859305778315:web:7defc0354ba246c1d5888e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'locker-system-authorized-v2'; 

        const ROWS = ['A', 'B', 'C', 'D', 'E'];
        const COLS = Array.from({ length: 18 }, (_, i) => i + 1);

        const Icon = ({ name, className, ...props }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} className={className} {...props}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [lockers, setLockers] = useState({});
            const [config, setConfig] = useState({ 
                allowedMembers: [], 
                disabledSlots: [], 
                adminCode: 'admin123',
                isSystemLocked: false 
            });
            
            const [studentId, setStudentId] = useState('');
            const [userName, setUserName] = useState('');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminInput, setAdminInput] = useState('');
            const [showAdminPanel, setShowAdminPanel] = useState(false);
            
            const [adminNewStudentId, setAdminNewStudentId] = useState('');
            const [adminNewName, setAdminNewName] = useState('');
            const [newAdminCode, setNewAdminCode] = useState('');
            const [editMode, setEditMode] = useState('reserve');
            const [toast, setToast] = useState(null);
            const [confirmModal, setConfirmModal] = useState(null);

            const showToast = useCallback((message, type = 'info') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            }, []);

            useEffect(() => {
                const initAuth = async () => {
                    try { await signInAnonymously(auth); } catch (e) { setError("서버 연결 실패."); }
                };
                initAuth();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                
                const lockerRef = collection(db, 'artifacts', appId, 'public', 'data', 'lockers');
                const unsubLockers = onSnapshot(query(lockerRef), (snap) => {
                    const d = {};
                    snap.forEach(doc => d[doc.id] = doc.data());
                    setLockers(d);
                    setLoading(false);
                }, (err) => { setError("데이터 읽기 오류."); setLoading(false); });

                const configRef = collection(db, 'artifacts', appId, 'public', 'data', 'config');
                const unsubConfig = onSnapshot(query(configRef), (snap) => {
                    const c = { allowedMembers: [], disabledSlots: [], adminCode: 'admin123', isSystemLocked: false };
                    snap.forEach(doc => {
                        if (doc.id === 'members') c.allowedMembers = doc.data().list || [];
                        if (doc.id === 'disabled') c.disabledSlots = doc.data().list || [];
                        if (doc.id === 'admin') c.adminCode = doc.data().code || 'admin123';
                        if (doc.id === 'system') c.isSystemLocked = doc.data().isLocked || false;
                    });
                    setConfig(c);
                });
                return () => { unsubLockers(); unsubConfig(); };
            }, [user]);

            const isMySlot = useCallback((lockerData) => {
                if (!lockerData || !isLoggedIn) return false;
                const sId = studentId.trim();
                const uName = userName.trim();
                return lockerData.studentId === sId && lockerData.name === uName;
            }, [studentId, userName, isLoggedIn]);

            const checkAuthorization = useCallback(() => {
                const sId = studentId.trim();
                const uName = userName.trim();
                if (!sId || !uName) return false;
                return config.allowedMembers.some(m => m.studentId === sId && m.name === uName);
            }, [studentId, userName, config.allowedMembers]);

            const handleSlotClick = async (slotId) => {
                if (isAdmin && editMode === 'manage-slots') {
                    const newList = config.disabledSlots.includes(slotId) 
                        ? config.disabledSlots.filter(id => id !== slotId)
                        : [...config.disabledSlots, slotId];
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'disabled'), { list: newList });
                    return;
                }

                const locker = lockers[slotId];
                const isMine = isMySlot(locker);

                if (config.isSystemLocked && !isAdmin) {
                    showToast("현재는 예약 시스템이 잠겨있어 수정이 불가능합니다.", "error");
                    return;
                }

                if (locker && (isMine || isAdmin)) {
                    setConfirmModal({
                        title: isAdmin && !isMine ? "관리자 강제 삭제" : "예약 취소",
                        message: isAdmin && !isMine ? `[${locker.studentId} ${locker.name}] 학생의 예약을 취소합니까?` : "본인의 사물함 예약을 취소하시겠습니까?",
                        onConfirm: async () => {
                            try {
                                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lockers', slotId));
                                showToast("취소되었습니다.");
                            } catch (e) { showToast("처리 오류", "error"); }
                            setConfirmModal(null);
                        }
                    });
                    return;
                }

                if (!locker && !config.disabledSlots.includes(slotId)) {
                    if (!isLoggedIn) {
                        showToast("학번과 이름을 먼저 입력하고 '설정 완료'를 눌러주세요.", "error"); 
                        return; 
                    }
                    if (!checkAuthorization()) {
                        showToast("등록되지 않은 명단입니다.", "error"); 
                        return;
                    }
                    if (Object.values(lockers).some(l => l.studentId === studentId.trim())) {
                        showToast("이미 예약된 자리가 있습니다.", "error"); 
                        return;
                    }
                    
                    try {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lockers', slotId), {
                            studentId: studentId.trim(),
                            name: userName.trim(), 
                            uid: user.uid, 
                            timestamp: Date.now()
                        });
                        showToast(`${slotId}번 예약 성공!`, "success");
                    } catch (e) { showToast("예약 실패", "error"); }
                }
            };

            const toggleSystemLock = async () => {
                const newStatus = !config.isSystemLocked;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'system'), { isLocked: newStatus });
                showToast(newStatus ? "시스템이 잠겼습니다." : "시스템 잠금이 해제되었습니다.");
            };

            const handleResetInfo = () => {
                setStudentId('');
                setUserName('');
                setIsLoggedIn(false);
                showToast("정보가 초기화되었습니다.");
            };

            const addSingleMember = async () => {
                const sId = adminNewStudentId.trim();
                const uName = adminNewName.trim();
                if (!sId || !uName) { showToast("정보를 모두 입력하세요.", "error"); return; }
                if (config.allowedMembers.some(m => m.studentId === sId)) { showToast("이미 등록된 학번입니다.", "error"); return; }
                const updatedList = [...config.allowedMembers, { studentId: sId, name: uName }];
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'members'), { list: updatedList });
                setAdminNewStudentId('');
                setAdminNewName('');
                showToast("명단 추가 완료");
            };

            const removeMember = async (studentIdToRemove) => {
                const newList = config.allowedMembers.filter(m => m.studentId !== studentIdToRemove);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'members'), { list: newList });
                showToast("명단 삭제 완료");
            };

            const changeAdminCode = async () => {
                if (!newAdminCode.trim()) return;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'admin'), { code: newAdminCode.trim() });
                showToast("관리자 비밀번호가 변경되었습니다.");
                setNewAdminCode('');
            };

            if (error) return <div className="h-screen flex items-center justify-center p-6 text-red-500 font-bold">{error}</div>;
            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-slate-400 animate-pulse text-lg text-center">데이터 로딩 중...</div>;

            return (
                <div className="min-h-screen pb-20">
                    {/* Toast & Modal */}
                    {toast && (
                        <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-bounce
                            ${toast.type === 'error' ? 'bg-red-600' : toast.type === 'success' ? 'bg-green-600' : 'bg-slate-800'} text-white text-sm font-bold`}>
                            <Icon name={toast.type === 'error' ? 'alert-circle' : 'check-circle'} className="w-5 h-5" />
                            {toast.message}
                        </div>
                    )}
                    {confirmModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4 text-center">
                            <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl animate-in zoom-in-95 duration-200">
                                <h3 className="text-xl font-black mb-2">{confirmModal.title}</h3>
                                <p className="text-slate-500 mb-6 text-sm leading-relaxed">{confirmModal.message}</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setConfirmModal(null)} className="flex-1 py-3 rounded-xl bg-slate-100 font-bold">취소</button>
                                    <button onClick={confirmModal.onConfirm} className="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold">확인</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Navbar */}
                    <div className="bg-white shadow-sm border-b sticky top-0 z-50 px-4 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-2 rounded-lg"><Icon name="shield-check" className="w-5 h-5 text-white" /></div>
                            <span className="font-black text-lg tracking-tighter uppercase">DS 사물함 예약 시스템</span>
                            {config.isSystemLocked && (
                                <span className="ml-2 bg-red-100 text-red-600 px-2 py-0.5 rounded text-[10px] font-bold">변경 잠금됨</span>
                            )}
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={handleResetInfo} className="text-xs font-bold bg-blue-50 text-blue-700 px-3 py-2 rounded-xl hover:bg-blue-100 transition-colors flex items-center gap-1 leading-none h-10 shadow-sm">
                                <Icon name="user-plus" className="w-3 h-3" /> 다른 학생으로 예약
                            </button>
                            <button onClick={() => setShowAdminPanel(!showAdminPanel)} className="p-2.5 hover:bg-slate-100 rounded-xl transition-colors">
                                <Icon name="settings" className="w-5 h-5 text-slate-400" />
                            </button>
                        </div>
                    </div>

                    <div className="max-w-[1700px] mx-auto p-4 md:p-8">
                        {/* Admin Panel */}
                        {showAdminPanel && (
                            <div className="mb-8 bg-slate-900 rounded-[2.5rem] p-6 text-white shadow-2xl animate-in slide-in-from-top-4 duration-300">
                                <div className="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
                                    <h2 className="font-bold text-blue-400 flex items-center gap-2 text-sm uppercase tracking-widest"><Icon name="lock" className="w-4 h-4"/> Admin Mode</h2>
                                    {!isAdmin ? (
                                        <div className="flex gap-2">
                                            <input type="password" placeholder="비밀번호" value={adminInput} onChange={e=>setAdminInput(e.target.value)} className="bg-slate-800 px-3 py-1.5 rounded-lg text-sm border border-slate-700 focus:border-blue-500 w-28 text-white outline-none" />
                                            <button onClick={()=>{if(adminInput===config.adminCode){setIsAdmin(true);setAdminInput('');}else{showToast("비번 불일치","error");}}} className="bg-blue-600 px-4 py-1.5 rounded-lg text-sm font-bold transition-all active:scale-95">인증</button>
                                        </div>
                                    ) : (
                                        <button onClick={()=>setIsAdmin(false)} className="bg-red-500/10 text-red-500 px-3 py-1 rounded-lg text-xs font-bold border border-red-500/20 uppercase tracking-widest">Logout</button>
                                    )}
                                </div>
                                {isAdmin && (
                                    <div className="grid md:grid-cols-3 gap-6">
                                        <div className="bg-slate-800 p-5 rounded-2xl border border-slate-700">
                                            <p className="text-[10px] font-black text-blue-300 mb-4 uppercase tracking-widest text-center flex items-center justify-center gap-2"><Icon name="user-plus" className="w-3 h-3"/> 개별 명단 등록</p>
                                            <div className="space-y-3">
                                                <input type="text" placeholder="학번" value={adminNewStudentId} onChange={e=>setAdminNewStudentId(e.target.value)} className="w-full bg-slate-900 p-3 rounded-xl text-sm border border-slate-700 text-white outline-none focus:border-blue-500" />
                                                <input type="text" placeholder="이름" value={adminNewName} onChange={e=>setAdminNewName(e.target.value)} className="w-full bg-slate-900 p-3 rounded-xl text-sm border border-slate-700 text-white outline-none focus:border-blue-500" />
                                                <button onClick={addSingleMember} className="w-full bg-blue-600 py-3 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all active:scale-95">명단 추가</button>
                                            </div>
                                        </div>

                                        <div className="bg-slate-800 p-5 rounded-2xl border border-slate-700">
                                            <p className="text-[10px] font-black text-blue-300 mb-4 uppercase tracking-widest text-center flex items-center justify-center gap-2"><Icon name="users" className="w-3 h-3"/> 등록 명단 ({config.allowedMembers.length}명)</p>
                                            <div className="max-h-64 overflow-y-auto custom-scrollbar flex flex-col gap-1 pr-1 bg-slate-950/50 p-2 rounded-xl border border-slate-800">
                                                {config.allowedMembers.map(m => (
                                                    <div key={m.studentId} className="bg-slate-900 px-3 py-2 rounded-lg text-[10px] flex items-center justify-between group border border-slate-800 hover:border-slate-600 transition-colors">
                                                        <span><span className="text-slate-500 mr-2 font-mono">{m.studentId}</span>{m.name}</span>
                                                        <button onClick={() => removeMember(m.studentId)} className="p-1.5 hover:bg-red-500/20 rounded transition-colors text-slate-500 hover:text-red-400">
                                                            <Icon name="trash-2" className="w-3.5 h-3.5" />
                                                        </button>
                                                    </div>
                                                ))}
                                                {config.allowedMembers.length === 0 && <p className="text-center text-[10px] text-slate-600 py-6 italic font-medium">등록된 학생 데이터가 없습니다.</p>}
                                            </div>
                                        </div>

                                        <div className="bg-slate-800 p-5 rounded-2xl border border-slate-700 flex flex-col gap-4">
                                            <div>
                                                <p className="text-[10px] font-black text-blue-300 mb-3 uppercase tracking-widest text-center">시스템 제어</p>
                                                <button 
                                                    onClick={toggleSystemLock}
                                                    className={`w-full py-3 rounded-xl font-bold text-sm mb-3 transition-all flex items-center justify-center gap-2 shadow-lg ${config.isSystemLocked ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700'}`}
                                                >
                                                    <Icon name={config.isSystemLocked ? "unlock" : "lock"} className="w-4 h-4" />
                                                    {config.isSystemLocked ? "예약 잠금 해제" : "예약 시스템 잠금"}
                                                </button>
                                                <div className="flex gap-2">
                                                    <button onClick={()=>setEditMode('reserve')} className={`flex-1 py-2.5 rounded-lg text-xs font-bold transition-all ${editMode==='reserve' ? 'bg-blue-600 text-white ring-2 ring-blue-400/30' : 'bg-slate-700 text-slate-400'}`}>수정 모드</button>
                                                    <button onClick={()=>setEditMode('manage-slots')} className={`flex-1 py-2.5 rounded-lg text-xs font-bold transition-all ${editMode==='manage-slots' ? 'bg-amber-500 text-white ring-2 ring-amber-400/30' : 'bg-slate-700 text-slate-400'}`}>차단 모드</button>
                                                </div>
                                            </div>

                                            <div className="border-t border-slate-700 pt-4">
                                                <p className="text-[10px] font-black text-blue-300 mb-2 uppercase tracking-widest text-center">관리자 설정</p>
                                                <div className="flex gap-2">
                                                    <input type="text" placeholder="새 비밀번호" value={newAdminCode} onChange={e=>setNewAdminCode(e.target.value)} className="flex-1 bg-slate-900 p-2 rounded-lg text-xs border border-slate-700 text-white outline-none focus:border-blue-500" />
                                                    <button onClick={changeAdminCode} className="bg-slate-700 px-3 py-2 rounded-lg text-xs font-bold hover:bg-slate-600 transition-colors">저장</button>
                                                </div>
                                            </div>

                                            <button onClick={async ()=>{if(!confirm("주의! 모든 예약 데이터가 영구적으로 삭제됩니다. 계속할까요?"))return;const snap=await getDocs(collection(db,'artifacts',appId,'public', 'data', 'lockers'));const b=writeBatch(db);snap.forEach(d=>b.delete(d.ref));await b.commit();showToast("데이터 초기화 완료");}} className="w-full border border-red-500/30 text-red-400 py-2.5 rounded-lg text-[10px] font-bold hover:bg-red-500 hover:text-white transition-all uppercase tracking-tighter mt-auto active:scale-95">Reset All Reservations</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Input Section */}
                        <div className="bg-white rounded-[2.5rem] shadow-xl p-6 md:p-8 mb-8 border border-slate-100">
                            <p className="text-[10px] font-black text-slate-400 mb-4 block uppercase tracking-widest text-center leading-none">학번과 이름을 정확히 입력하고 '설정 완료'를 누르면 사물함 선택이 가능합니다</p>
                            <div className="flex flex-col md:flex-row gap-4 items-end">
                                <div className="flex-1 w-full grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="relative group">
                                        <Icon name="hash" className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 w-5 h-5 group-focus-within:text-blue-500 transition-colors" />
                                        <input type="text" value={studentId} onChange={e=>setStudentId(e.target.value)} placeholder="학번 (예: 122XXXXX)" className="w-full pl-14 pr-6 py-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none font-bold text-lg transition-all h-16" />
                                    </div>
                                    <div className="relative group">
                                        <Icon name="user" className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 w-5 h-5 group-focus-within:text-blue-500 transition-colors" />
                                        <input type="text" value={userName} onChange={e=>setUserName(e.target.value)} placeholder="이름 (예: 홍길동)" className="w-full pl-14 pr-6 py-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none font-bold text-lg transition-all h-16" />
                                    </div>
                                </div>
                                <button onClick={()=>{
                                    if(studentId.trim() && userName.trim()) {
                                        if (checkAuthorization()) {
                                            setIsLoggedIn(true);
                                            showToast("인증되었습니다. 이제 자리를 선택하세요.","success");
                                        } else {
                                            setIsLoggedIn(false);
                                            showToast("등록되지 않은 명단입니다.", "error");
                                        }
                                    } else {
                                        showToast("학번과 이름을 모두 입력해주세요.", "error");
                                    }
                                }} className="px-10 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all w-full md:w-auto h-16">설정 완료</button>
                            </div>
                        </div>

                        {/* Locker Grid - 가로 스크롤 및 고정 너비 적용 */}
                        <div className={`bg-white rounded-[3rem] p-6 shadow-2xl overflow-x-auto border-8 transition-all ${editMode==='manage-slots'?'border-amber-400':'border-white'} custom-scrollbar`}>
                            <div className="w-fit mx-auto">
                                {/* 열 번호 표시 */}
                                <div className="flex gap-2 mb-4 pl-[60px]">
                                    {COLS.map(c => (
                                        <div key={c} className="locker-cell flex items-center justify-center font-black text-slate-300 text-sm">
                                            {c}열
                                        </div>
                                    ))}
                                </div>

                                {ROWS.map(row => (
                                    <div key={row} className="flex gap-2 mb-2">
                                        {/* 행 이름 표시 */}
                                        <div className="w-[50px] flex items-center justify-center font-black text-3xl text-blue-600 bg-blue-50/50 rounded-2xl shadow-inner mr-2">
                                            {row}
                                        </div>
                                        {COLS.map(col => {
                                            const id = `${row}${col}`;
                                            const l = lockers[id];
                                            const isMine = isMySlot(l);
                                            const isDis = config.disabledSlots.includes(id);
                                            const isOcc = !!l;
                                            
                                            return (
                                                <button 
                                                    key={id} 
                                                    onClick={()=>handleSlotClick(id)} 
                                                    className={`locker-cell rounded-2xl border-2 transition-all flex flex-col items-center justify-center relative group
                                                        ${isDis ? 'bg-red-50 border-red-100 text-red-200 cursor-not-allowed' :
                                                          isMine ? 'bg-blue-600 border-blue-700 text-white shadow-xl scale-[0.97] z-10 mine-highlight' :
                                                          isOcc ? 'bg-slate-100 border-slate-200 text-slate-400' :
                                                          'bg-white border-slate-100 hover:border-blue-400 hover:shadow-xl text-slate-200'}
                                                    `}
                                                >
                                                    {isDis ? <Icon name="ban" className="w-6 h-6 opacity-30"/> :
                                                     isMine ? (
                                                        <>
                                                            <Icon name="check-circle" className="w-5 h-5 mb-1"/>
                                                            <span className="text-[10px] font-black truncate px-1 w-full uppercase leading-none">{l.name}</span>
                                                        </>
                                                     ) :
                                                     isOcc ? (
                                                        <>
                                                            <Icon name="lock" className={`w-4 h-4 mb-1 ${isAdmin ? 'text-blue-500' : 'opacity-10'}`}/>
                                                            <span className="text-[9px] font-bold truncate px-1 w-full leading-none text-center">
                                                                {isAdmin ? l.name : "예약 완료"}
                                                            </span>
                                                            {isAdmin && (
                                                                <div className="absolute inset-0 bg-red-600/90 rounded-2xl opacity-0 group-hover:opacity-100 flex flex-col items-center justify-center transition-opacity border border-white p-1">
                                                                    <span className="text-[8px] text-white font-bold truncate w-full text-center mb-1">{l.studentId}</span>
                                                                    <span className="text-[9px] text-white font-black truncate w-full text-center mb-1">{l.name}</span>
                                                                    <Icon name="trash-2" className="w-4 h-4 text-white mt-1"/>
                                                                </div>
                                                            )}
                                                        </>
                                                     ) :
                                                     <><Icon name="unlock" className="w-4 h-4 opacity-5 mb-1"/><span className="text-[10px] font-black leading-none">{id}</span></>}
                                                </button>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Legend */}
                        <div className="mt-10 flex flex-wrap gap-10 justify-center text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <div className="flex items-center gap-3"><div className="w-5 h-5 bg-white border-2 border-slate-200 rounded-lg"></div> 빈 자리</div>
                            <div className="flex items-center gap-3"><div className="w-5 h-5 bg-blue-600 rounded-lg shadow-md shadow-blue-200"></div> 내 사물함 (이름 표시)</div>
                            <div className="flex items-center gap-3"><div className="w-5 h-5 bg-slate-100 rounded-lg"></div> 타인 예약 (예약 완료 표시)</div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
