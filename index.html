<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사물함 선착순 예약 시스템 (Authorized Only)</title>
    <!-- React & Tailwind CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @keyframes pulse-border {
            0% { border-color: rgba(37, 99, 235, 0.5); }
            50% { border-color: rgba(37, 99, 235, 1); }
            100% { border-color: rgba(37, 99, 235, 0.5); }
        }
        .mine-highlight {
            animation: pulse-border 2s infinite;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useCallback, useMemo } = React;

        // Firebase Modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCANVK_865365opkg7r-rWHEZsFLQ93zJ0",
            authDomain: "book-your-locker.firebaseapp.com",
            projectId: "book-your-locker",
            storageBucket: "book-your-locker.firebasestorage.app",
            messagingSenderId: "859305778315",
            appId: "1:859305778315:web:7defc0354ba246c1d5888e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'locker-system-authorized-v2'; 

        const ROWS = ['A', 'B', 'C', 'D', 'E'];
        const COLS = Array.from({ length: 18 }, (_, i) => i + 1);

        const Icon = ({ name, className, ...props }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} className={className} {...props}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [lockers, setLockers] = useState({});
            const [config, setConfig] = useState({ allowedMembers: [], disabledSlots: [], adminCode: 'admin123' });
            
            const [studentId, setStudentId] = useState(localStorage.getItem('locker_student_id') || '');
            const [userName, setUserName] = useState(localStorage.getItem('locker_user_name') || '');
            
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminInput, setAdminInput] = useState('');
            const [showAdminPanel, setShowAdminPanel] = useState(false);
            
            const [adminNewStudentId, setAdminNewStudentId] = useState('');
            const [adminNewName, setAdminNewName] = useState('');
            
            const [newAdminCode, setNewAdminCode] = useState('');
            const [editMode, setEditMode] = useState('reserve');
            const [toast, setToast] = useState(null);
            const [confirmModal, setConfirmModal] = useState(null);

            const showToast = useCallback((message, type = 'info') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            }, []);

            useEffect(() => {
                const initAuth = async () => {
                    try { await signInAnonymously(auth); } catch (e) { setError("서버 연결 실패."); }
                };
                initAuth();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                
                const lockerRef = collection(db, 'artifacts', appId, 'public', 'data', 'lockers');
                const unsubLockers = onSnapshot(query(lockerRef), (snap) => {
                    const d = {};
                    snap.forEach(doc => d[doc.id] = doc.data());
                    setLockers(d);
                    setLoading(false);
                }, (err) => { setError("데이터 읽기 오류."); setLoading(false); });

                const configRef = collection(db, 'artifacts', appId, 'public', 'data', 'config');
                const unsubConfig = onSnapshot(query(configRef), (snap) => {
                    const c = { allowedMembers: [], disabledSlots: [], adminCode: 'admin123' };
                    snap.forEach(doc => {
                        if (doc.id === 'members') c.allowedMembers = doc.data().list || [];
                        if (doc.id === 'disabled') c.disabledSlots = doc.data().list || [];
                        if (doc.id === 'admin') c.adminCode = doc.data().code || 'admin123';
                    });
                    setConfig(c);
                });
                return () => { unsubLockers(); unsubConfig(); };
            }, [user]);

            const isMySlot = useCallback((lockerData) => {
                if (!lockerData) return false;
                const sId = studentId.trim();
                const uName = userName.trim();
                return lockerData.studentId === sId && lockerData.name === uName && sId !== "" && uName !== "";
            }, [studentId, userName]);

            const checkAuthorization = useCallback(() => {
                const sId = studentId.trim();
                const uName = userName.trim();
                if (!sId || !uName) return false;
                return config.allowedMembers.some(m => m.studentId === sId && m.name === uName);
            }, [studentId, userName, config.allowedMembers]);

            const handleSlotClick = async (slotId) => {
                if (isAdmin && editMode === 'manage-slots') {
                    const newList = config.disabledSlots.includes(slotId) 
                        ? config.disabledSlots.filter(id => id !== slotId)
                        : [...config.disabledSlots, slotId];
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'disabled'), { list: newList });
                    return;
                }

                const locker = lockers[slotId];
                const isMine = isMySlot(locker);

                if (locker && (isMine || isAdmin)) {
                    setConfirmModal({
                        title: isAdmin && !isMine ? "관리자 강제 삭제" : "예약 취소",
                        message: isAdmin && !isMine ? `[${locker.studentId} ${locker.name}] 학생의 예약을 취소합니까?` : "본인의 사물함 예약을 취소하시겠습니까?",
                        onConfirm: async () => {
                            try {
                                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lockers', slotId));
                                showToast("취소되었습니다.");
                            } catch (e) { showToast("취소 중 오류 발생", "error"); }
                            setConfirmModal(null);
                        }
                    });
                    return;
                }

                if (!locker && !config.disabledSlots.includes(slotId)) {
                    const sId = studentId.trim();
                    const uName = userName.trim();
                    
                    if (!sId || !uName) { 
                        showToast("학번과 이름을 입력하고 '설정 완료'를 눌러주세요.", "error"); 
                        return; 
                    }

                    if (!checkAuthorization()) {
                        showToast("명단에 등록되지 않았거나 학번/이름이 일치하지 않습니다.", "error"); 
                        return;
                    }

                    if (Object.values(lockers).some(l => l.studentId === sId)) {
                        showToast(`학번 ${sId}로 이미 예약된 자리가 있습니다.`, "error"); 
                        return;
                    }
                    
                    try {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lockers', slotId), {
                            studentId: sId,
                            name: uName, 
                            uid: user.uid, 
                            timestamp: Date.now()
                        });
                        localStorage.setItem('locker_student_id', sId);
                        localStorage.setItem('locker_user_name', uName);
                        showToast(`${slotId}번 예약 성공!`, "success");
                    } catch (e) { showToast("예약 실패", "error"); }
                }
            };

            const switchUser = async () => {
                setConfirmModal({
                    title: "다른 학생으로 예약",
                    message: "현재 정보를 지우고 다른 학생의 정보를 입력하시겠습니까?",
                    onConfirm: async () => {
                        localStorage.removeItem('locker_student_id');
                        localStorage.removeItem('locker_user_name');
                        setStudentId('');
                        setUserName('');
                        location.reload();
                    }
                });
            };

            const addSingleMember = async () => {
                const sId = adminNewStudentId.trim();
                const uName = adminNewName.trim();
                if (!sId || !uName) { showToast("정보를 모두 입력하세요.", "error"); return; }
                if (config.allowedMembers.some(m => m.studentId === sId)) { showToast("이미 등록된 학번입니다.", "error"); return; }

                try {
                    const updatedList = [...config.allowedMembers, { studentId: sId, name: uName }];
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'members'), { list: updatedList });
                    setAdminNewStudentId('');
                    setAdminNewName('');
                    showToast("명단 추가 완료");
                } catch (e) {
                    showToast("등록 실패", "error");
                }
            };

            const removeMember = async (studentIdToRemove) => {
                try {
                    const newList = config.allowedMembers.filter(m => m.studentId !== studentIdToRemove);
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'members'), { list: newList });
                    showToast("명단 삭제 완료");
                } catch (e) {
                    showToast("삭제 처리 실패", "error");
                }
            };

            if (error) return <div className="h-screen flex items-center justify-center p-6 text-red-500 font-bold">{error}</div>;
            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-slate-400 animate-pulse text-lg text-center">보안 연결 중...</div>;

            return (
                <div className="min-h-screen pb-20">
                    {/* Toast & Modal */}
                    {toast && (
                        <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-bounce
                            ${toast.type === 'error' ? 'bg-red-600' : toast.type === 'success' ? 'bg-green-600' : 'bg-slate-800'} text-white text-sm font-bold`}>
                            <Icon name={toast.type === 'error' ? 'alert-circle' : 'check-circle'} className="w-5 h-5" />
                            {toast.message}
                        </div>
                    )}
                    {confirmModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4 text-center">
                            <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl animate-in zoom-in-95 duration-200">
                                <h3 className="text-xl font-black mb-2">{confirmModal.title}</h3>
                                <p className="text-slate-500 mb-6 text-sm leading-relaxed">{confirmModal.message}</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setConfirmModal(null)} className="flex-1 py-3 rounded-xl bg-slate-100 font-bold">취소</button>
                                    <button onClick={confirmModal.onConfirm} className="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold">확인</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Navbar */}
                    <div className="bg-white shadow-sm border-b sticky top-0 z-50 px-4 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-2 rounded-lg"><Icon name="shield-check" className="w-5 h-5 text-white" /></div>
                            <span className="font-black text-lg tracking-tighter uppercase">Authorized Only</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={switchUser} className="text-xs font-bold bg-blue-50 text-blue-700 px-3 py-2 rounded-xl hover:bg-blue-100 transition-colors flex items-center gap-1 leading-none h-10 shadow-sm">
                                <Icon name="user-plus" className="w-3 h-3" /> 다른 학생으로 예약
                            </button>
                            <button onClick={() => setShowAdminPanel(!showAdminPanel)} className="p-2.5 hover:bg-slate-100 rounded-xl transition-colors">
                                <Icon name="settings" className="w-5 h-5 text-slate-400" />
                            </button>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto p-4 md:p-8">
                        {/* Admin Panel */}
                        {showAdminPanel && (
                            <div className="mb-8 bg-slate-900 rounded-[2.5rem] p-6 text-white shadow-2xl animate-in slide-in-from-top-4 duration-300">
                                <div className="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
                                    <h2 className="font-bold text-blue-400 flex items-center gap-2 text-sm uppercase tracking-widest"><Icon name="lock" className="w-4 h-4"/> Admin Mode</h2>
                                    {!isAdmin ? (
                                        <div className="flex gap-2">
                                            <input type="password" placeholder="비밀번호" value={adminInput} onChange={e=>setAdminInput(e.target.value)} className="bg-slate-800 px-3 py-1.5 rounded-lg text-sm border border-slate-700 focus:border-blue-500 w-28 text-white outline-none" />
                                            <button onClick={()=>{if(adminInput===config.adminCode){setIsAdmin(true);setAdminInput('');}else{showToast("비번 불일치","error");}}} className="bg-blue-600 px-4 py-1.5 rounded-lg text-sm font-bold">인증</button>
                                        </div>
                                    ) : (
                                        <button onClick={()=>setIsAdmin(false)} className="bg-red-500/10 text-red-500 px-3 py-1 rounded-lg text-xs font-bold border border-red-500/20 uppercase tracking-widest">Logout</button>
                                    )}
                                </div>
                                {isAdmin && (
                                    <div className="grid md:grid-cols-3 gap-6">
                                        <div className="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                                            <p className="text-[10px] font-black text-blue-300 mb-4 uppercase tracking-widest text-center">개별 등록</p>
                                            <div className="space-y-3">
                                                <input type="text" placeholder="학번" value={adminNewStudentId} onChange={e=>setAdminNewStudentId(e.target.value)} className="w-full bg-slate-900 p-3 rounded-xl text-sm border border-slate-700 text-white outline-none focus:border-blue-500" />
                                                <input type="text" placeholder="이름" value={adminNewName} onChange={e=>setAdminNewName(e.target.value)} className="w-full bg-slate-900 p-3 rounded-xl text-sm border border-slate-700 text-white outline-none focus:border-blue-500" />
                                                <button onClick={addSingleMember} className="w-full bg-blue-600 py-3 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all active:scale-95">명단 추가</button>
                                            </div>
                                        </div>
                                        <div className="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                                            <p className="text-[10px] font-black text-blue-300 mb-2 uppercase tracking-widest text-center">등록된 명단 ({config.allowedMembers.length}명)</p>
                                            <div className="max-h-56 overflow-y-auto custom-scrollbar flex flex-col gap-1 pr-1 bg-slate-950/50 p-2 rounded-xl border border-slate-800">
                                                {config.allowedMembers.map(m => (
                                                    <div key={m.studentId} className="bg-slate-900 px-3 py-1.5 rounded-lg text-[10px] flex items-center justify-between group border border-slate-800">
                                                        <span><span className="text-slate-500 mr-2 font-mono">{m.studentId}</span>{m.name}</span>
                                                        <button 
                                                            onClick={() => removeMember(m.studentId)} 
                                                            className="p-1 hover:bg-red-500/20 rounded transition-colors"
                                                            title="삭제"
                                                        >
                                                            <Icon name="trash-2" className="w-3.5 h-3.5 text-slate-500 hover:text-red-400" />
                                                        </button>
                                                    </div>
                                                ))}
                                                {config.allowedMembers.length === 0 && <p className="text-center text-[10px] text-slate-600 py-4 italic">등록된 학생이 없습니다.</p>}
                                            </div>
                                        </div>
                                        <div className="bg-slate-800 p-4 rounded-2xl border border-slate-700 flex flex-col justify-between">
                                            <div>
                                                <p className="text-[10px] font-black text-blue-300 mb-2 uppercase tracking-widest text-center">환경 설정</p>
                                                <div className="flex gap-2 mb-4">
                                                    <button onClick={()=>setEditMode('reserve')} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${editMode==='reserve'?'bg-blue-600 text-white shadow-lg shadow-blue-500/20':'bg-slate-700 text-slate-400'}`}>예약 모드</button>
                                                    <button onClick={()=>setEditMode('manage-slots')} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${editMode==='manage-slots'?'bg-amber-500 text-white shadow-lg shadow-amber-500/20':'bg-slate-700 text-slate-400'}`}>차단 모드</button>
                                                </div>
                                                <input type="text" placeholder="새 관리자 비밀번호" value={newAdminCode} onChange={e=>setNewAdminCode(e.target.value)} className="w-full bg-slate-900 p-2 rounded-lg mb-2 text-xs border border-slate-700 text-white outline-none focus:border-blue-500" />
                                                <button onClick={async ()=>{if(!newAdminCode.trim())return;await setDoc(doc(db,'artifacts',appId,'public','data','config','admin'),{code:newAdminCode.trim()});setNewAdminCode('');showToast("비밀번호 변경 완료");}} className="w-full bg-slate-700 py-2 rounded-lg text-xs font-bold hover:bg-slate-600 mb-4 transition-colors">비번 저장</button>
                                            </div>
                                            <button onClick={async ()=>{if(!confirm("모든 예약 데이터를 삭제합니까?"))return;const snap=await getDocs(collection(db,'artifacts',appId,'public', 'data', 'lockers'));const b=writeBatch(db);snap.forEach(d=>b.delete(d.ref));await b.commit();showToast("데이터 초기화 완료");}} className="w-full border border-red-500/30 text-red-400 py-2 rounded-lg text-[10px] font-bold hover:bg-red-500 hover:text-white transition-all uppercase tracking-tighter active:scale-95">Reset All</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Input Section */}
                        <div className="bg-white rounded-[2.5rem] shadow-xl p-6 md:p-8 mb-8 border border-slate-100">
                            <p className="text-[10px] font-black text-slate-400 mb-4 block uppercase tracking-widest text-center leading-none">관리자가 등록한 학번과 이름을 정확히 입력해야 예약 권한이 생깁니다</p>
                            <div className="flex flex-col md:flex-row gap-4 items-end">
                                <div className="flex-1 w-full grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="relative group">
                                        <Icon name="hash" className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 w-5 h-5 group-focus-within:text-blue-500 transition-colors" />
                                        <input type="text" value={studentId} onChange={e=>setStudentId(e.target.value)} placeholder="학번 (예: 122XXXXX)" className="w-full pl-14 pr-6 py-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none font-bold text-lg transition-all h-16" />
                                    </div>
                                    <div className="relative group">
                                        <Icon name="user" className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 w-5 h-5 group-focus-within:text-blue-500 transition-colors" />
                                        <input type="text" value={userName} onChange={e=>setUserName(e.target.value)} placeholder="이름 (예: 홍길동)" className="w-full pl-14 pr-6 py-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none font-bold text-lg transition-all h-16" />
                                    </div>
                                </div>
                                <button onClick={()=>{
                                    if(studentId.trim() && userName.trim()) {
                                        localStorage.setItem('locker_student_id', studentId.trim());
                                        localStorage.setItem('locker_user_name', userName.trim());
                                        if (checkAuthorization()) {
                                            showToast("인증되었습니다. 이제 자리를 선택하세요.","success");
                                        } else {
                                            showToast("등록되지 않은 명단입니다.", "error");
                                        }
                                    } else {
                                        showToast("정보를 모두 입력해주세요.", "error");
                                    }
                                }} className="px-10 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all w-full md:w-auto h-16">설정 완료</button>
                            </div>
                        </div>

                        {/* Grid */}
                        <div className={`bg-white rounded-[3rem] p-6 shadow-2xl overflow-x-auto border-8 transition-all ${editMode==='manage-slots'?'border-amber-400':'border-white'}`}>
                            <div className="min-w-[1500px]">
                                <div className="grid grid-cols-[60px_repeat(18,1fr)] gap-3 mb-6">
                                    <div className="h-4"></div>
                                    {COLS.map(c => <div key={c} className="text-center font-black text-slate-200 text-sm leading-none">{c}열</div>)}
                                </div>
                                {ROWS.map(row => (
                                    <div key={row} className="grid grid-cols-[60px_repeat(18,1fr)] gap-3 mb-3">
                                        <div className="flex items-center justify-center font-black text-3xl text-blue-600 bg-blue-50/50 rounded-2xl shadow-inner">{row}</div>
                                        {COLS.map(col => {
                                            const id = `${row}${col}`;
                                            const l = lockers[id];
                                            const isMine = isMySlot(l);
                                            const isDis = config.disabledSlots.includes(id);
                                            const isOcc = !!l;
                                            
                                            return (
                                                <button key={id} onClick={()=>handleSlotClick(id)} className={`h-24 rounded-2xl border-2 transition-all flex flex-col items-center justify-center relative group
                                                    ${isDis ? 'bg-red-50 border-red-100 text-red-200 cursor-not-allowed' :
                                                      isMine ? 'bg-blue-600 border-blue-700 text-white shadow-xl scale-[0.97] z-10 mine-highlight' :
                                                      isOcc ? 'bg-slate-100 border-slate-200 text-slate-400' :
                                                      'bg-white border-slate-100 hover:border-blue-400 hover:shadow-xl text-slate-200'}
                                                `}>
                                                    {isDis ? <Icon name="ban" className="w-6 h-6 opacity-30"/> :
                                                     isMine ? <><Icon name="check-circle" className="w-6 h-6 mb-1"/><span className="text-[11px] font-black truncate px-2 w-full uppercase leading-none">{l.name}</span></> :
                                                     isOcc ? (
                                                        <>
                                                            <Icon name="lock" className="w-5 h-5 opacity-10 mb-1"/>
                                                            <span className="text-[10px] font-bold truncate px-2 w-full leading-none">
                                                                {isAdmin ? `${l.studentId} ${l.name}` : "예약 완료"}
                                                            </span>
                                                            {isAdmin && (
                                                                <div className="absolute inset-0 bg-red-600/80 rounded-2xl opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity border border-white">
                                                                    <Icon name="trash-2" className="w-7 h-7 text-white"/>
                                                                </div>
                                                            )}
                                                        </>
                                                     ) :
                                                     <><Icon name="unlock" className="w-5 h-5 opacity-5 mb-1"/><span className="text-[10px] font-black leading-none">{id}</span></>}
                                                </button>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Legend */}
                        <div className="mt-10 flex flex-wrap gap-10 justify-center text-[10px] font-black text-slate-400 uppercase tracking-widest">
                            <div className="flex items-center gap-3"><div className="w-5 h-5 bg-white border-2 border-slate-200 rounded-lg"></div> 빈 자리</div>
                            <div className="flex items-center gap-3"><div className="w-5 h-5 bg-blue-600 rounded-lg shadow-md shadow-blue-200"></div> 내 사물함 (이름 표시)</div>
                            <div className="flex items-center gap-3"><div className="w-5 h-5 bg-slate-100 rounded-lg"></div> 타인 예약 (예약 완료 표시)</div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
